# Local development dependencies for etl-platform.
# Brings up: control Postgres, Temporal (+ UI), MinIO (S3-compatible).
# The application services (api / web / worker) run on the host via pnpm dev.
#
#   docker compose up -d
#
services:
  postgres:
    image: postgres:16-alpine
    container_name: etl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: etl
      POSTGRES_PASSWORD: etl
      POSTGRES_DB: etl_control
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl -d etl_control"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Separate Postgres for Temporal's own persistence (kept isolated from the
  # control DB so platform data and orchestration state never mix).
  temporal-postgres:
    image: postgres:16-alpine
    container_name: etl-temporal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.25.0
    container_name: etl-temporal
    restart: unless-stopped
    depends_on:
      - temporal-postgres
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgres
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.31.0
    container_name: etl-temporal-ui
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8080:8080"

  minio:
    image: minio/minio:latest
    container_name: etl-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the default bucket on startup.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 minioadmin minioadmin) do echo waiting for minio; sleep 2; done;
      mc mb --ignore-existing local/etl-platform;
      exit 0;
      "

volumes:
  postgres-data:
  temporal-postgres-data:
  minio-data:
